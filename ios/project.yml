name: FleeceApp
options:
  bundleIdPrefix: io.getfleece
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_PREVIEWS: YES
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "2"

targets:
  FleeceApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FleeceApp
        excludes:
          - Info.plist
          - FleeceApp.entitlements
    assets: FleeceApp/Assets.xcassets
    info:
      path: FleeceApp/Info.plist
      properties:
        NSLocationWhenInUseUsageDescription: "Fleece detects nearby stores to recommend the best credit card for your purchase."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Fleece uses background location to send card recommendations as you move between stores."
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - fleece
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false   # no custom encryption — skips export compliance Q
    entitlements:
      path: FleeceApp/FleeceApp.entitlements
      properties: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.getfleece.app
        INFOPLIST_KEY_CFBundleDisplayName: Fleece
        INFOPLIST_FILE: FleeceApp/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "UHR6VA2R4D"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          CODE_SIGNING_ALLOWED: YES
        Release:
          CODE_SIGNING_ALLOWED: YES
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          ENABLE_TESTABILITY: NO
